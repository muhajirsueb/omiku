<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusat Persiapan OMI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 25%, #ffffff 50%, #fff9c4 85%, #fbc02d 100%);
            background-attachment: fixed;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiM4ZThlOGIiIGZpbGwtb3BhY2l0eT0iMC4wNSI+PHBhdGggZD0iTTAgMGg0MHY0MEgwVjB6bTIwIDIwaDIwdjIwSDIWMjB6TTAgMjBoMjB2MjBIMFYyMHoyMCAwaDIwdjIwaC0yMFYweiIvPjwvZz48L2c+PC9zdmc+');
            background-repeat: repeat;
            opacity: 0.4;
            z-index: 1;
        }

        /* --- LOGO DI KIRI ATAS --- */
        .header-logo {
            position: absolute;
            top: 30px;
            left: 40px;
            z-index: 10;
            text-align: left;
        }

        .logo-main-text {
            font-family: 'Quicksand', sans-serif;
            font-size: 40px; /* Ukuran diperkecil agar standar logo */
            font-weight: 700;
            line-height: 1;
            display: flex;
            gap: 2px;
            /* Stroke putih agar terlihat jelas di background hijau */
            text-shadow: 
                -2px -2px 0 #fff,  
                 2px -2px 0 #fff,
                -2px  2px 0 #fff,
                 2px  2px 0 #fff;
        }

        .letter-o { color: #2e7d32; }
        .letter-m { color: #1565c0; }
        .letter-i { color: #64b5f6; }
        .letter-k { color: #fbc02d; }
        .letter-u { color: #fbc02d; }

        .logo-sub-text {
            font-size: 11px;
            color: #333;
            letter-spacing: 0.3px;
            margin-top: 5px;
            font-weight: 700;
            text-transform: uppercase;
            /* Stroke putih tipis */
            text-shadow: 
                -1px -1px 0 #fff,  
                 1px -1px 0 #fff,
                -1px  1px 0 #fff,
                 1px  1px 0 #fff;
        }

        /* --- KONTEN TENGAH --- */
        .container {
            text-align: center;
            animation: fadeIn 1.2s ease-out;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 1000px;
            margin-top: 60px; /* Memberi ruang agar tidak tabrakan dengan logo */
        }

        h1 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 10px;
            color: #1b5e20;
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff;
        }

        p.subtitle {
            font-size: 18px;
            color: #1d1d1f;
            margin-bottom: 50px;
            font-weight: 600;
            text-shadow: 1px 1px 0 #fff;
        }

        .jenjang-wrapper {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-jenjang {
            border: none;
            border-radius: 24px;
            height: 160px;
            width: 220px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .btn-jenjang:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .btn-mi { background-color: #a5d6a7; color: #1b5e20; }
        .btn-mts { background-color: #90caf9; color: #0d47a1; }
        .btn-ma { background-color: #ffd54f; color: #5d4037; }

        .label {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: 2px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Penyesuaian untuk HP */
        @media (max-width: 800px) {
            .header-logo {
                position: relative;
                top: 0;
                left: 0;
                text-align: center;
                margin-bottom: 20px;
            }
            .container { margin-top: 0; }
            .logo-main-text { justify-content: center; font-size: 36px; }
            .jenjang-wrapper { flex-direction: column; align-items: center; }
            .btn-jenjang { width: 90%; height: 110px; }
        }
    </style>
</head>
<body>

    <header class="header-logo">
        <div class="logo-main-text">
            <span class="letter-o">O</span>
            <span class="letter-m">M</span>
            <span class="letter-i">I</span>
            <span class="letter-k">K</span>
            <span class="letter-u">U</span>
        </div>
        <div class="logo-sub-text">Dedicated to the Nation from Muhajir Sueb</div>
    </header>

    <div class="container">
        <h1>Selamat Datang, Calon Juara</h1>
        <p class="subtitle">Pilih jenjang untuk memulai simulasi persiapan.</p>

        <div class="jenjang-wrapper">
            <a href="MI/dashboard_mi.html" class="btn-jenjang btn-mi">
                <span class="label">MI</span>
            </a>
            
            <a href="MTs/dashboard_mts.html" class="btn-jenjang btn-mts">
                <span class="label">MTs</span>
            </a>
            
            <a href="MA/dashboard_ma.html" class="btn-jenjang btn-ma">
                <span class="label">MA</span>
            </a>
        </div>
    </div>

</body>
</html>
