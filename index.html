<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pusat Persiapan OMI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            /* Gradasi Tiga Warna: Hijau - Putih - Kuning */
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 25%, #ffffff 50%, #fff9c4 85%, #fbc02d 100%);
            background-attachment: fixed;
        }

        /* Aksen Pattern Floral Lembut */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiM4ZThlOGIiIGZpbGwtb3BhY2l0eT0iMC4wNSI+PHBhdGggZD0iTTAgMGg0MHY0MEgwVjB6bTIwIDIwaDIwdjIwSDIWMjB6TTAgMjBoMjB2MjBIMFYyMHoyMCAwaDIwdjIwaC0yMFYweiIvPjwvZz48L2c+PC9zdmc+');
            background-repeat: repeat;
            opacity: 0.4;
            z-index: 1;
        }

        .container {
            text-align: center;
            animation: fadeIn 1.2s ease-out;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        /* Update Teks: Menggunakan Outline Putih agar Jelas */
        h1 {
            font-size: 46px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
            color: #1b5e20; /* Warna Hijau Tua agar kontras dengan outline */
            
            /* Efek Outline Putih (Text Stroke) */
            text-shadow: 
                -2px -2px 0 #fff,  
                 2px -2px 0 #fff,
                -2px  2px 0 #fff,
                 2px  2px 0 #fff,
                 0px 4px 10px rgba(0,0,0,0.2); 
        }

        p {
            font-size: 22px;
            color: #1d1d1f;
            margin-bottom: 60px;
            font-weight: 600;
            
            /* Outline Putih tipis untuk sub-teks */
            text-shadow: 
                -1px -1px 0 #fff,  
                 1px -1px 0 #fff,
                -1px  1px 0 #fff,
                 1px  1px 0 #fff;
        }

        .jenjang-wrapper {
            display: flex;
            gap: 40px;
            justify-content: center;
        }

        .btn-jenjang {
            border: none;
            border-radius: 32px;
            height: 180px;
            width: 250px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        }

        .btn-jenjang:hover {
            transform: translateY(-12px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.25);
        }

        /* Warna Tombol Per Jenjang */
        .btn-mi { background-color: #a5d6a7; color: #1b5e20; }
        .btn-mts { background-color: #90caf9; color: #0d47a1; }
        .btn-ma { background-color: #e0e0e0; color: #424242; }

        .label {
            font-size: 48px;
            font-weight: 800;
            letter-spacing: 2px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 800px) {
            body { overflow-y: auto; height: auto; padding: 60px 0; }
            .jenjang-wrapper { flex-direction: column; align-items: center; gap: 30px;}
            h1 { font-size: 32px; }
            .btn-jenjang { width: 85%; height: 140px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Selamat Datang, Calon Juara OMI</h1>
        <p>Silakan pilih jenjang pendidikan Anda untuk memulai persiapan.</p>

       <div class="jenjang-wrapper">
    <a href="MI/dashboard_mi.html" class="btn-jenjang btn-mi">
        <span class="label">MI</span>
    </a>
    <a href="MTs/dashboard_mts.html" class="btn-jenjang btn-mts">
        <span class="label">MTs</span>
    </a>
    <a href="MA/dashboard_ma.html" class="btn-jenjang btn-ma">
        <span class="label">MA</span>
    </a>
</div>
    </div>

</body>
</html>
