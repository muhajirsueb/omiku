<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilih Mata Pelajaran - Try Out OMI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            /* Warna Kemenag Pekat */
            background: linear-gradient(135deg, #0a3d0e 0%, #1b5e20 50%, #c6a700 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; padding: 60px 20px;
            position: relative;
        }

        body::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2); z-index: -1;
        }

        .header { text-align: center; margin-bottom: 50px; }
        
        h1 { 
            font-size: 38px; font-weight: 800; color: #ffffff; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3), 0 0 10px rgba(255,255,255,0.2); 
            margin-bottom: 10px;
        }

        .sub-desc { 
            font-size: 18px; color: #fdd835; font-weight: 700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .menu-grid {
            display: flex; gap: 30px; justify-content: center;
            max-width: 1100px; width: 100%; margin-bottom: 60px;
            flex-wrap: wrap;
        }

        /* CARD MENU MAPEL */
        .card-mapel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 35px;
            width: 300px; height: 350px;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            padding: 30px; text-align: center;
            border: 1px solid rgba(255,255,255,0.4);
        }

        .card-mapel:hover {
            transform: translateY(-15px);
            background: #ffffff;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .icon-circle {
            width: 100px; height: 100px;
            background: #f5f5f7;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 50px; margin-bottom: 25px;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.05);
        }

        .label {
            font-size: 24px; font-weight: 800;
            margin-bottom: 12px;
            text-shadow: 0.5px 0.5px 0px #fff;
        }

        /* Warna spesifik teks mapel */
        .text-mat { color: #1565c0; }
        .text-sai { color: #2e7d32; }
        .text-sos { color: #f57f17; }

        .desc {
            font-size: 14px; color: #515154;
            font-weight: 600; line-height: 1.4;
        }

        .btn-back {
            text-decoration: none; background: #ffffff; color: #1b5e20;
            padding: 18px 45px; border-radius: 50px; font-weight: 800;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            transition: 0.3s; border: 2px solid #ffffff;
        }

        .btn-back:hover { background: #1b5e20; color: white; transform: scale(1.05); }

    </style>
</head>
<body>

    <div class="header">
        <h1>Simulasi Try Out OMI</h1>
        <p class="sub-desc">Pilih Bidang Studi Kompetisi</p>
    </div>

    <div class="menu-grid">
        <a href="tryout_matematika.html" class="card-mapel">
            <div class="icon-circle">📐</div>
            <span class="label text-mat">MATEMATIKA</span>
            <span class="desc">Uji logika dan ketepatan berhitungmu di sini.</span>
        </a>

        <a href="tryout_sains.html" class="card-mapel">
            <div class="icon-circle">🧪</div>
            <span class="label text-sai">SAINS (IPA)</span>
            <span class="desc">Jelajahi rahasia alam lewat soal-soal eksperimental.</span>
        </a>

        <a href="tryout_sosial.html" class="card-mapel">
            <div class="icon-circle">🌍</div>
            <span class="label text-sos">SOSIAL (IPS)</span>
            <span class="desc">Analisis sejarah dan fenomena sosial masyarakat.</span>
        </a>
    </div>

    <div class="btn-footer">
        <a href="dashboard_mi.html" class="btn-back">← Kembali ke Dashboard</a>
    </div>

</body>
</html>
