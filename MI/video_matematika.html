<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Pengayaan MI - OMIKU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #1b5e20 0%, #0a3d0e 100%);
            color: white; padding: 40px 20px; min-height: 100vh; text-align: center;
        }

        h1 { font-weight: 900; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .sub-title { color: #fdd835; margin-bottom: 40px; font-weight: 700; }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px; max-width: 1200px; margin: 0 auto;
        }

        .video-card {
            background: white; border-radius: 15px; overflow: hidden;
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .video-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }

        .thumb-box { position: relative; width: 100%; aspect-ratio: 16/9; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .play-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2); display: flex; justify-content: center; align-items: center;
            transition: 0.3s;
        }
        .video-card:hover .play-overlay { background: rgba(0,0,0,0.4); }

        .play-btn {
            background: #ff0000; color: white; padding: 10px 20px;
            border-radius: 50px; font-weight: bold; font-size: 13px;
        }

        .video-info { padding: 15px; color: #333; text-align: left; height: 80px; display: flex; align-items: center; }
        .video-info h3 { font-size: 15px; line-height: 1.4; color: #1b5e20; }

        /* CSS MODAL POPUP */
        #videoModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center;
        }
        .modal-content { width: 95%; max-width: 900px; position: relative; }
        .close-modal {
            position: absolute; top: -50px; right: 0; color: white;
            font-size: 35px; cursor: pointer; font-weight: bold;
        }
        .video-container { position: relative; width: 100%; padding-bottom: 56.25%; height: 0; }
        .video-container iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            border: 4px solid #fdd835; border-radius: 10px;
        }

        .btn-back {
            display: inline-block; margin-top: 50px; padding: 15px 40px;
            background: #fdd835; color: #1b5e20; text-decoration: none;
            border-radius: 50px; font-weight: 900; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn-back:hover { background: white; transform: scale(1.05); }
    </style>
</head>
<body>

    <h1>Materi Video MI</h1>
    <p class="sub-title">Klik kartu untuk memutar video pembelajaran</p>

    <div class="video-grid">
        <script>
            const videos = [
                { id: 'eKEdehtTnRk', title: 'Bilangan Bulat dan Cacah' },
                { id: '_XVIW0BIVwU', title: 'Operasi Hitung Bilangan Bulat' },
                { id: 'kvwJ9y9W97A', title: 'Perkalian dan Pembagian Bilangan Bulat' },
                { id: 'l-Loj3eyvyA', title: 'Hitung Bilangan Positif dan Negative' },
                { id: 'Hd62N_6goEo', title: 'Contoh Soal Cerita' },
                { id: 'Du_HnNCVXdc', title: 'Pecahan 1' },
                { id: 'dkeGwSqx68w', title: 'Pecahan 2' },
                { id: 'YSZvm6wYApc', title: 'Pecahan 3' },
                { id: 'Cg_LKYp6k3A', title: 'Pecahan 4' },
                { id: 'ZNS-Gqc3LmM', title: 'Pecahan 5' },
                { id: '5hkPfKii6VI', title: 'Pecahan 6' }
            ];

            const grid = document.querySelector('.video-grid');
            videos.forEach(vid => {
                grid.innerHTML += `
                    <div class="video-card" onclick="openVideo('${vid.id}')">
                        <div class="thumb-box">
                            <img src="https://img.youtube.com/vi/${vid.id}/mqdefault.jpg" alt="${vid.title}">
                            <div class="play-overlay"><div class="play-btn">▶ PUTAR VIDEO</div></div>
                        </div>
                        <div class="video-info"><h3>${vid.title}</h3></div>
                    </div>
                `;
            });
        </script>
    </div>

    <br>
    <a href="../index.html" class="btn-back">← KEMBALI KE MENU UTAMA</a>

    <div id="videoModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeVideo()">× TUTUP</span>
            <div class="video-container">
                <iframe id="youtubePlayer" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        function openVideo(videoId) {
            const iframe = document.getElementById('youtubePlayer');
            iframe.src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1&rel=0";
            document.getElementById('videoModal').style.display = 'flex';
        }

        function closeVideo() {
            const iframe = document.getElementById('youtubePlayer');
            iframe.src = "";
            document.getElementById('videoModal').style.display = 'none';
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('videoModal')) { closeVideo(); }
        }
    </script>

</body>
</html>
