<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard MI - Persiapan OMI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* WARNA LEBIH PEKAT: Hijau Tua ke Kuning Emas Muted */
            background: linear-gradient(135deg, #0a3d0e 0%, #1b5e20 40%, #c6a700 100%);
            background-attachment: fixed;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Overlay gelap tipis agar mata lebih nyaman */
        body::before {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.1);
            z-index: 0;
        }

        .header, .menu-wrapper, .btn-footer {
            z-index: 1; /* Supaya berada di atas overlay */
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 42px;
            font-weight: 800;
            color: #ffffff; /* Putih agar kontras dengan BG gelap */
            /* STROKE PUTIH TIPIS */
            text-shadow: 1px 1px 0px rgba(255,255,255,0.3), -1px -1px 0px rgba(255,255,255,0.3);
            margin-bottom: 5px;
        }

        .sub-header {
            font-size: 18px;
            color: #fdd835; /* Kuning terang agar terbaca di BG gelap */
            font-weight: 600;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .menu-wrapper {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 60px;
        }

        .btn-menu {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 35px;
            width: 280px;
            height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            padding: 25px;
            text-align: center;
        }

        .btn-menu:hover {
            transform: translateY(-12px);
            background: #ffffff;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
        }

        .icon-circle {
            width: 90px; height: 90px;
            background: #f5f5f7;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 45px; margin-bottom: 25px;
        }

        .label {
            font-size: 24px;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 12px;
            /* STROKE PUTIH TIPIS PADA TEXT HITAM */
            text-shadow: 0.5px 0.5px 0px #fff, -0.5px -0.5px 0px #fff;
        }

        .desc {
            font-size: 15px;
            color: #515154;
            font-weight: 500;
            line-height: 1.4;
        }

        .btn-home {
            text-decoration: none;
            background: #ffffff;
            color: #1b5e20;
            padding: 15px 45px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
            border: 2px solid #ffffff;
        }

        .btn-home:hover {
            background: #1b5e20;
            color: white;
            transform: scale(1.05);
        }

        @media (max-width: 900px) {
            .menu-wrapper { flex-direction: column; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Persiapan OMI - Jenjang MI</h1>
        <p class="sub-header">Pusat Belajar Mandiri Calon Juara</p>
    </div>

    <div class="menu-wrapper">
    <a href="materi_video_mi.html" class="btn-menu">
        <div class="icon-circle">▶️</div> 
        <span class="label">Materi Video OMI</span>
        <span class="desc">Pelajari video materi sesuai kisi-kisi</span>
    </a>

    <a href="materi_teks_mi.html" class="btn-menu">
        <div class="icon-circle">📘</div>
        <span class="label">Materi Teks OMI</span>
        <span class="desc">Pelajari Teks materi sesuai kisi-kisi</span>
    </a>

    <a href="tryout_menu.html" class="btn-menu">
        <div class="icon-circle">✍️</div>
        <span class="label">Try OUT</span>
        <span class="desc">Latih kemampuan menaklukkan soal-soal OMI</span>
    </a>
</div>

   <div class="btn-footer">
    <a href="./../OMIKU.html" class="btn-home">← Kembali Pilih Jenjang</a>
    </div>

</body>
</html>
