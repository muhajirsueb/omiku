<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Try Out Fisika - OMI MA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            /* Palette MA: Perpaduan Navy, Biru Slate, dan Burnt Orange */
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            --card-bg: rgba(255, 255, 255, 0.98);
            --accent-fisika: #e65100; /* Orange yang lebih tajam tapi elegan */
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            /* Background dengan gradasi biru gelap yang halus */
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 60px 20px;
        }

        .header { text-align: center; margin-bottom: 50px; }
        
        h1 { 
            font-size: 34px; 
            font-weight: 800; 
            color: #ffffff; 
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            /* Efek glow putih halus pada teks */
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .sub-desc { 
            font-size: 14px; 
            color: #cbd5e1; 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .tryout-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 25px; 
            max-width: 1100px; 
            width: 100%; 
            margin-bottom: 60px; 
        }

        .card-to {
            background: var(--card-bg); 
            border-radius: 24px; 
            padding: 28px;
            display: flex; 
            align-items: center; 
            gap: 20px; 
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.2); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        /* Dekorasi gradasi putih halus di dalam kartu saat hover */
        .card-to::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: translateX(-100%);
            transition: 0.6s;
        }

        .card-to:hover::before {
            transform: translateX(100%);
        }

        .card-to:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border-bottom: 4px solid var(--accent-fisika);
        }

        .icon-box {
            width: 70px; height: 70px; 
            background: #fff7ed; /* Soft Orange tint */
            border-radius: 18px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            font-size: 30px; 
            color: var(--accent-fisika);
            box-shadow: 0 4px 10px rgba(230, 81, 0, 0.1);
        }

        .info-box { flex-grow: 1; }

        .to-title { 
            font-size: 20px; 
            font-weight: 800; 
            color: var(--text-main); 
            margin-bottom: 4px; 
        }

        .to-status { 
            font-size: 12px; 
            font-weight: 700; 
            color: var(--accent-fisika); 
            background: #ffebd2; 
            padding: 4px 12px; 
            border-radius: 8px; 
            display: inline-block; 
        }

        .btn-footer { width: 100%; text-align: center; }

        .btn-back {
            text-decoration: none; 
            background: rgba(255, 255, 255, 0.1); 
            color: #ffffff;
            padding: 16px 40px; 
            border-radius: 50px; 
            font-weight: 700;
            transition: 0.3s;
            display: inline-block; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        .btn-back:hover { 
            background: #ffffff; 
            color: #0f172a; 
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Simulasi Fisika MA</h1>
        <p class="sub-desc">Eksplorasi Hukum Alam & Mekanika Kompleks</p>
    </div>

    <div class="tryout-grid">
        <div class="card-to" onclick="location.href='soal_fisika_ma_1.html'">
            <div class="icon-box"><i class="fa-solid fa-bolt-lightning"></i></div>
            <div class="info-box">
                <div class="to-title">TRY OUT 1</div>
                <div class="to-status">Materi: Mekanika</div>
            </div>
        </div>

        <div class="card-to" onclick="location.href='soal_fisika_ma_2.html'">
            <div class="icon-box"><i class="fa-solid fa-fire-flame-curved"></i></div>
            <div class="info-box">
                <div class="to-title">TRY OUT 2</div>
                <div class="to-status">Materi: Termodinamika</div>
            </div>
        </div>

        <div class="card-to" onclick="location.href='soal_fisika_ma_3.html'">
            <div class="icon-box"><i class="fa-solid fa-atom"></i></div>
            <div class="info-box">
                <div class="to-title">TRY OUT 3</div>
                <div class="to-status">Materi: Fisika Modern</div>
            </div>
        </div>

        <div class="card-to" onclick="location.href='soal_fisika_ma_4.html'">
            <div class="icon-box"><i class="fa-solid fa-magnet"></i></div>
            <div class="info-box">
                <div class="to-title">TRY OUT 4</div>
                <div class="to-status">Materi: Listrik & Magnet</div>
            </div>
        </div>

        <div class="card-to" onclick="location.href='soal_fisika_ma_5.html'">
            <div class="icon-box"><i class="fa-solid fa-wave-square"></i></div>
            <div class="info-box">
                <div class="to-title">TRY OUT 5</div>
                <div class="to-status">Materi: Optik</div>
            </div>
        </div>

        <div class="card-to" onclick="location.href='soal_fisika_ma_6.html'">
            <div class="icon-box"><i class="fa-solid fa-trophy"></i></div>
            <div class="info-box">
                <div class="to-title">TRY OUT 6</div>
                <div class="to-status">Final Simulation</div>
            </div>
        </div>
    </div>

    <div class="btn-footer">
        <a href="tryout_ma.html" class="btn-back">
            <i class="fa-solid fa-chevron-left"></i> Kembali ke Menu Mapel
        </a>
    </div>
</body>
</html>
