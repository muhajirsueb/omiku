<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Try Out Sosial - OMI MA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            /* Palette Slate Grey Dewasa khas MA */
            --ma-dark: #263238;
            --ma-slate: #37474f;
            --ma-accent-social: #bf360c; /* Oranye Deep untuk Sosial MA */
            --text-light: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            /* Menyesuaikan dengan background Slate Grey MA */
            background: linear-gradient(135deg, var(--ma-slate) 0%, var(--ma-dark) 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; padding: 60px 20px;
            position: relative;
        }

        .header { text-align: center; margin-bottom: 50px; }
        
        h1 { 
            font-size: 36px; font-weight: 800; color: #ffffff; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3); margin-bottom: 10px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sub-desc { 
            font-size: 16px; color: #cfd8dc; font-weight: 600; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .tryout-grid { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 25px; max-width: 1100px; width: 100%; margin-bottom: 60px; 
        }

        /* CARD TO - Desain Putih Kontras Premium */
        .card-to {
            background: rgba(255, 255, 255, 0.98); border-radius: 25px; padding: 30px;
            display: flex; align-items: center; gap: 20px; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .card-to:hover { 
            transform: translateY(-10px); background: #ffffff; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.5); border-color: var(--ma-accent-social); 
        }

        /* Ikon Box - Menggunakan Oranye Deep Sosial */
        .icon-box {
            width: 75px; height: 75px; 
            background: linear-gradient(135deg, var(--ma-accent-social), #e64a19);
            border-radius: 20px; display: flex; justify-content: center; align-items: center;
            font-size: 32px; color: #ffffff; box-shadow: 0 8px 15px rgba(191, 54, 12, 0.3);
        }

        .info-box { flex-grow: 1; }

        .to-title { font-size: 22px; font-weight: 800; color: var(--ma-dark); margin-bottom: 4px; }

        .to-status { 
            font-size: 13px; font-weight: 700; color: var(--ma-accent-social); 
            background: #fbe9e7; padding: 4px 12px; border-radius: 50px; 
            display: inline-block; 
        }

        .btn-footer { width: 100%; text-align: center; }

        .btn-back {
            text-decoration: none; 
            background: var(--ma-dark); 
            color: #ffffff;
            padding: 18px 45px; 
            border-radius: 50px; 
            font-weight: 800;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            transition: 0.3s; 
            display: inline-block; 
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-back:hover { 
            background: var(--ma-slate); 
            color: white; 
            transform: translateY(-3px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Simulasi Sosial MA</h1>
        <p class="sub-desc">Uji Kompetensi Ekonomi & Geografi OMI</p>
    </div>

    <div class="tryout-grid">
        <div class="card-to" onclick="location.href='soal_sosial_ma_1.html'">
            <div class="icon-box"><i class="fa-solid fa-chart-line"></i></div>
            <div class="info-box">
                <div class="to-title">TRY OUT 1</div>
                <div class="to-status">Level: Menengah</div>
            </div>
        </div>

        <div class="card-to" onclick="location.href='soal_sosial_ma_2.html'">
            <div class="icon-box"><i class="fa-solid fa-earth-americas"></i></div>
            <div class="info-box">
                <div class="to-title">TRY OUT 2</div>
                <div class="to-status">Level: Menengah</div>
            </div>
        </div>

        <div class="card-to" onclick="location.href='soal_sosial_ma_3.html'">
            <div class="icon-box"><i class="fa-solid fa-landmark"></i></div>
            <div class="info-box">
                <div class="to-title">TRY OUT 3</div>
                <div class="to-status">Level: Lanjut</div>
            </div>
        </div>

        <div class="card-to" onclick="location.href='soal_sosial_ma_4.html'">
            <div class="icon-box"><i class="fa-solid fa-hand-holding-dollar"></i></div>
            <div class="info-box">
                <div class="to-title">TRY OUT 4</div>
                <div class="to-status">Level: Mahir</div>
            </div>
        </div>

        <div class="card-to" onclick="location.href='soal_sosial_ma_5.html'">
            <div class="icon-box"><i class="fa-solid fa-mountain-sun"></i></div>
            <div class="info-box">
                <div class="to-title">TRY OUT 5</div>
                <div class="to-status">Level: Expert (HOTS)</div>
            </div>
        </div>

        <div class="card-to" onclick="location.href='soal_sosial_ma_6.html'">
            <div class="icon-box"><i class="fa-solid fa-scale-balanced"></i></div>
            <div class="info-box">
                <div class="to-title">TRY OUT 6</div>
                <div class="to-status">Level: National Finalist</div>
            </div>
        </div>
    </div>

    <div class="btn-footer">
        <a href="tryout_ma.html" class="btn-back">← Kembali ke Menu Mapel MA</a>
    </div>
</body>
</html>
